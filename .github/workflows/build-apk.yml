name: Build ZeroChat APK 

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: '34.0.0'
    
    - name: Setup Getting Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.7
    
    - name: Build Debug APK
      run: chmod +x gradlew && ./gradlow assembleDebug --no-daemon --stacktrace
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: zerochat-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error